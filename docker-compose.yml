version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017
      - JWT_SECRET=your_super_secret_jwt_key
      - CLIENT_URL=http://localhost:3000
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASS=admin123
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
